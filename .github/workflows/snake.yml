name: Contribution snake 🐍

on:
  schedule:
    # Daily at 00:00 UTC — keeps the snake in sync with your grid
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-snake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare assets folder
        run: mkdir -p assets

      - name: Generate SVG from contribution graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-contribution-grid-snake.svg
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit and push if SVGs changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(actions): regenerate contribution snake [skip ci]'
          file_pattern: 'assets/github-contribution-grid-snake*.svg'
